<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 · 방탈출 예약</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">방탈출 예약</a>
    <nav class="nav">
        <a th:href="@{/}">홈</a>
        <a th:href="@{/popular}">인기 테마</a>
    </nav>
    <div class="nav-auth" id="nav-auth"></div>
</header>

<main class="auth-shell">
    <section class="auth-card">
        <div class="auth-header">
            <span class="auth-eyebrow">WELCOME BACK</span>
            <h1>로그인</h1>
            <p class="auth-subtitle">예약을 등록하거나 확인하려면 로그인이 필요합니다.</p>
        </div>

        <form id="login-form" class="auth-form" novalidate>
            <label class="auth-field">
                <span class="auth-label">이메일</span>
                <input class="input" type="email" name="email" placeholder="user@test.com" required autocomplete="email">
            </label>
            <label class="auth-field">
                <span class="auth-label">비밀번호</span>
                <input class="input" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </label>
            <p id="error-message" class="auth-error" role="alert"></p>
            <button type="submit" class="btn btn-primary btn-block">로그인</button>
        </form>

        <p class="auth-hint">
            테스트 계정: <code>admin@test.com</code> / <code>password</code>
        </p>
    </section>
</main>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
