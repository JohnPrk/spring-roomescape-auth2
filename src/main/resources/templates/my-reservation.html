<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 예약 · 방탈출</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">방탈출 예약</a>
    <nav class="nav">
        <a th:href="@{/}">홈</a>
        <a class="active" th:href="@{/my}">내 예약</a>
        <a th:href="@{/popular}">인기 테마</a>
        <a th:href="@{/admin}">어드민</a>
    </nav>
    <div class="nav-auth" id="nav-auth"></div>
</header>

<main class="container">
    <div class="page-header">
        <div>
            <h1>내 예약</h1>
            <p class="subtitle">로그인한 사용자의 예약 내역입니다.</p>
        </div>
        <button id="add-button" class="btn btn-primary" type="button">+ 예약 추가</button>
    </div>

    <section class="card">
        <table class="data">
            <thead>
            <tr>
                <th style="width: 60px;">#</th>
                <th>테마</th>
                <th>날짜</th>
                <th>시간</th>
                <th class="actions"></th>
            </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </section>
</main>

<dialog id="add-dialog" class="modal">
    <div class="modal-card">
        <header class="modal-header">
            <h2>새 예약 추가</h2>
            <button type="button" class="modal-close" id="add-close" aria-label="닫기">×</button>
        </header>
        <div class="modal-body">
            <label class="modal-field">
                <span class="modal-label">테마</span>
                <select id="add-theme" class="select"></select>
            </label>
            <label class="modal-field">
                <span class="modal-label">날짜</span>
                <input type="date" id="add-date" class="input">
            </label>
            <label class="modal-field">
                <span class="modal-label">시간</span>
                <select id="add-time" class="select" disabled></select>
            </label>
        </div>
        <footer class="modal-footer">
            <button type="button" class="btn btn-ghost" id="add-cancel">취소</button>
            <button type="button" class="btn btn-primary" id="add-save">저장</button>
        </footer>
    </div>
</dialog>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/my-reservation.js}"></script>
</body>
</html>
